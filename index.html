    <style>
      /* Popup container */
      .popup {
        position: relative;
        display: inline-block;
        cursor: pointer;
      }

      /* The actual popup (appears on top) */
      .popup .popupimg {
        visibility: hidden;
        width: 250px;
        background-color: transparent;
        text-align: center;
        border-radius: 6px;
        padding: 8px 0;
        position: absolute;
        z-index: 999;
        bottom: -75%;
        left: 75%;
      }

      .clippy-wrap {
        position: relative;
        display: inline-block;
      }

      .clippy-main {
        display: block;
      }

      .clippy-text {
        position: absolute;
        bottom: 95%;
        left: -140%;
        width: auto;
      }

      /* Toggle visibility */
      .popup .show {
        visibility: visible;
        -webkit-animation: fadeIn 1s;
        animation: fadeIn 1s;
      }

      /* Fade-in animation */
      @-webkit-keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
